<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clear LocalStorage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f1f5f9;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .storage-info {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
      text-align: left;
    }

    .storage-info .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 4px;
    }

    .storage-info .value {
      font-size: 15px;
      font-weight: 600;
      color: #38bdf8;
    }

    .btn-clear {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .btn-clear:hover {
      background: linear-gradient(135deg, #f87171, #ef4444);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(239,68,68,0.4);
    }

    .btn-clear:active { transform: translateY(0); }

    .btn-clear:disabled {
      background: #334155;
      color: #64748b;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    /* Modal */
    .modal {
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 16px;
      padding: 36px 32px;
      width: 360px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      animation: popIn 0.2s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal .warn-icon { font-size: 44px; margin-bottom: 14px; }

    .modal h2 {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 10px;
    }

    .modal p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 26px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .btn-cancel {
      flex: 1;
      background: #334155;
      color: #cbd5e1;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover { background: #475569; }

    .btn-confirm {
      flex: 1;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-confirm:hover {
      background: linear-gradient(135deg, #f87171, #ef4444);
      box-shadow: 0 4px 14px rgba(239,68,68,0.4);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #22c55e;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.35s ease;
      z-index: 200;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">🗄️</div>
    <h1>LocalStorage Manager</h1>
    <p>Lihat dan bersihkan semua data yang tersimpan di LocalStorage browser ini.</p>

    <div class="storage-info">
      <div class="label">Item tersimpan</div>
      <div class="value" id="itemCount">Memuat...</div>
    </div>

    <button class="btn-clear" id="btnClear" onclick="showConfirm()">
      🗑️ Bersihkan LocalStorage
    </button>
  </div>

  <!-- Popup Konfirmasi -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="warn-icon">⚠️</div>
      <h2>Konfirmasi Hapus</h2>
      <p>Semua data di LocalStorage akan dihapus secara permanen.<br>Tindakan ini <strong>tidak dapat dibatalkan</strong>.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="hideConfirm()">Batal</button>
        <button class="btn-confirm" onclick="clearStorage()">Ya, Hapus Semua</button>
      </div>
    </div>
  </div>

  <!-- Toast Notifikasi -->
  <div class="toast" id="toast">✅ LocalStorage berhasil dibersihkan!</div>

  <script>
    function updateInfo() {
      const count = localStorage.length;
      const el = document.getElementById('itemCount');
      const btn = document.getElementById('btnClear');

      if (count === 0) {
        el.textContent = 'Tidak ada item (kosong)';
        el.style.color = '#64748b';
        btn.disabled = true;
        btn.textContent = '✓ LocalStorage Sudah Kosong';
      } else {
        el.textContent = count + ' item ditemukan';
        el.style.color = '#38bdf8';
        btn.disabled = false;
        btn.textContent = '🗑️ Bersihkan LocalStorage';
      }
    }

    function showConfirm() {
      document.getElementById('overlay').classList.add('active');
    }

    function hideConfirm() {
      document.getElementById('overlay').classList.remove('active');
    }

    function clearStorage() {
      localStorage.clear();
      hideConfirm();
      updateInfo();
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Tutup modal jika klik di luar
    document.getElementById('overlay').addEventListener('click', function(e) {
      if (e.target === this) hideConfirm();
    });

    // Init
    updateInfo();
  </script>

</body>
</html>
