<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Analytics — Lidan.co.id</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3045;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --text: #e8eaf0;
    --muted: #6b7a99;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    min-height: 100vh;
  }

  /* Background grid pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo-area h1 {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .logo-area h1 span {
    color: var(--accent);
  }

  .logo-area p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(52,211,153,0.1);
    border: 1px solid rgba(52,211,153,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--green);
    font-weight: 500;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .refresh-btn:hover {
    color: var(--text);
    border-color: var(--accent);
    background: rgba(79,142,247,0.08);
  }

  /* Period selector */
  .period-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
  }

  .period-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .period-btn.active, .period-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .kpi-card:hover { border-color: rgba(79,142,247,0.3); }
  .kpi-card:hover::before { opacity: 1; }

  .kpi-label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  .kpi-value {
    font-family: var(--font-display);
    font-size: 36px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 8px;
  }

  .kpi-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .kpi-icon {
    position: absolute;
    top: 18px; right: 18px;
    font-size: 20px;
    opacity: 0.3;
  }

  /* Chart area */
  .chart-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }

  /* Bar chart */
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 140px;
  }

  .bar-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    height: 100%;
    justify-content: flex-end;
  }

  .bar {
    width: 100%;
    background: linear-gradient(180deg, var(--accent), rgba(79,142,247,0.3));
    border-radius: 4px 4px 0 0;
    min-height: 4px;
    transition: all 0.5s ease;
    cursor: pointer;
    position: relative;
  }

  .bar:hover { filter: brightness(1.2); }

  .bar-label {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
  }

  /* Top pages list */
  .list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .list-item:last-child { border-bottom: none; }

  .list-bar-wrap {
    flex: 1;
    position: relative;
  }

  .list-bar-bg {
    position: absolute;
    inset: -6px 0;
    border-radius: 4px;
    background: rgba(79,142,247,0.06);
    transform-origin: left;
  }

  .list-label {
    position: relative;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }

  .list-count {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
  }

  /* Bottom grid */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  /* Device donut */
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 8px;
  }

  .donut-legend { flex: 1; }

  .legend-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .legend-left {
    display: flex;
    align-items: center;
    color: var(--text);
  }

  .legend-pct {
    color: var(--muted);
    font-size: 12px;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
    gap: 10px;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .last-update {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-row { grid-template-columns: 1fr; }
    .bottom-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; gap: 12px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-area">
      <h1>Analytics <span>lidan.co.id</span></h1>
      <p>Dashboard statistik kunjungan website — Cloudflare Web Analytics</p>
    </div>
    <div class="header-right">
      <div class="live-badge">
        <div class="live-dot"></div>
        Live
      </div>
      <button class="refresh-btn" onclick="loadData()">
        ↻ Refresh
      </button>
    </div>
  </header>

  <div class="period-bar">
    <button class="period-btn active" onclick="setPeriod(1440, this)">24 Jam</button>
    <button class="period-btn" onclick="setPeriod(10080, this)">7 Hari</button>
    <button class="period-btn" onclick="setPeriod(43200, this)">30 Hari</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card">
      <div class="kpi-icon">👁</div>
      <div class="kpi-label">Total Pageviews</div>
      <div class="kpi-value" id="kpiViews"><div class="loading"><div class="spinner"></div></div></div>
      <div class="kpi-sub" id="kpiViewsSub">Memuat...</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">👤</div>
      <div class="kpi-label">Pengunjung Unik</div>
      <div class="kpi-value" id="kpiVisitors"><div class="loading"><div class="spinner"></div></div></div>
      <div class="kpi-sub" id="kpiVisitorsSub">Memuat...</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">⚡</div>
      <div class="kpi-label">Avg. Load Time</div>
      <div class="kpi-value" id="kpiLoad"><div class="loading"><div class="spinner"></div></div></div>
      <div class="kpi-sub" id="kpiLoadSub">Memuat...</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">📈</div>
      <div class="kpi-label">Bounce Rate</div>
      <div class="kpi-value" id="kpiBounce"><div class="loading"><div class="spinner"></div></div></div>
      <div class="kpi-sub" id="kpiBounceSub">Memuat...</div>
    </div>
  </div>

  <!-- Chart + Top Pages -->
  <div class="chart-row">
    <div class="card">
      <div class="card-title">Kunjungan per Jam / Hari</div>
      <div class="bar-chart" id="barChart">
        <div class="loading"><div class="spinner"></div> Memuat grafik...</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Halaman Terpopuler</div>
      <div id="topPages">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- Bottom stats -->
  <div class="bottom-grid">
    <div class="card">
      <div class="card-title">Asal Negara</div>
      <div id="topCountries">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Perangkat</div>
      <div id="deviceStats">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Browser</div>
      <div id="browserStats">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <div class="last-update" id="lastUpdate">—</div>
</div>

<script>
  // =============================================
  // KONFIGURASI — Ganti jika token berubah
  // =============================================
  const CONFIG = {
    apiToken: 'cfut_ZvntvdVUIfAPgNy9FyKai3MRkJA3zhaJqyL2ipuHdd952935',
    zoneId:   '9c3f514c3f168765c9b0268b512f38ed',
    siteTag:  null // akan diambil otomatis
  };

  let currentMinutes = 1440;

  function setPeriod(minutes, btn) {
    currentMinutes = minutes;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData();
  }

  function fmt(n) {
    if (n === null || n === undefined) return '—';
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'jt';
    if (n >= 1000) return (n/1000).toFixed(1) + 'rb';
    return n.toString();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.style.display = 'block';
    el.textContent = '⚠ ' + msg;
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  async function cfetch(path) {
    const res = await fetch('https://api.cloudflare.com/client/v4' + path, {
      headers: { 'Authorization': 'Bearer ' + CONFIG.apiToken }
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.errors?.[0]?.message || 'API error');
    return json.result;
  }

  async function getSiteTag() {
    if (CONFIG.siteTag) return CONFIG.siteTag;
    try {
      const sites = await cfetch('/zones/' + CONFIG.zoneId + '/web3/hostnames');
      if (sites && sites.length > 0) {
        CONFIG.siteTag = sites[0].dnslink;
      }
    } catch(e) {}

    // Fallback: gunakan zone analytics langsung
    return null;
  }

  async function loadKPI() {
    try {
      const now = new Date();
      const since = new Date(now - currentMinutes * 60 * 1000).toISOString();
      const until = now.toISOString();

      const data = await cfetch(
        `/zones/${CONFIG.zoneId}/analytics/dashboard?since=${since}&until=${until}&continuous=true`
      );

      const totals = data.totals;
      const requests = totals.requests?.all || 0;
      const uniq = totals.uniques?.all || 0;
      const loadTime = totals.pageviews?.all || 0;
      const threats = totals.threats?.all || 0;

      document.getElementById('kpiViews').textContent = fmt(requests);
      document.getElementById('kpiViewsSub').textContent = 'Total request masuk';

      document.getElementById('kpiVisitors').textContent = fmt(uniq);
      document.getElementById('kpiVisitorsSub').textContent = 'IP unik';

      document.getElementById('kpiLoad').textContent = fmt(loadTime);
      document.getElementById('kpiLoadSub').textContent = 'Total pageviews';

      document.getElementById('kpiBounce').textContent = fmt(threats);
      document.getElementById('kpiBounceSub').textContent = 'Threats diblokir';

      // Chart data
      const timeseries = data.timeseries || [];
      renderBarChart(timeseries);

      // Countries
      const countries = totals.requests?.country || {};
      renderList('topCountries', countries, '🌍', true);

      // Content types as browser proxy
      const ssl = totals.requests?.ssl || {};
      renderDevices(ssl);

    } catch(e) {
      showError('Gagal memuat data: ' + e.message);
      ['kpiViews','kpiVisitors','kpiLoad','kpiBounce'].forEach(id => {
        document.getElementById(id).textContent = '—';
      });
    }
  }

  async function loadPages() {
    try {
      // Cloudflare Web Analytics pages via GraphQL
      const now = new Date();
      const since = new Date(now - currentMinutes * 60 * 1000).toISOString().split('T')[0];

      const query = `{
        viewer {
          zones(filter: {zoneTag: "${CONFIG.zoneId}"}) {
            httpRequestsAdaptiveGroups(
              limit: 8,
              filter: {date_geq: "${since}"},
              orderBy: [count_DESC]
            ) {
              count
              dimensions { clientRequestPath }
            }
          }
        }
      }`;

      const res = await fetch('https://api.cloudflare.com/client/v4/graphql', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + CONFIG.apiToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ query })
      });

      const json = await res.json();
      const groups = json?.data?.viewer?.zones?.[0]?.httpRequestsAdaptiveGroups || [];

      if (groups.length === 0) {
        document.getElementById('topPages').innerHTML = '<div style="color:var(--muted);font-size:13px;padding:12px 0;">Belum ada data halaman</div>';
        return;
      }

      const max = groups[0].count;
      let html = '';
      groups.forEach(g => {
        const path = g.dimensions.clientRequestPath || '/';
        const count = g.count;
        const pct = Math.round((count / max) * 100);
        html += `
          <div class="list-item">
            <div class="list-bar-wrap">
              <div class="list-bar-bg" style="width:${pct}%"></div>
              <div class="list-label" title="${path}">${path}</div>
            </div>
            <div class="list-count">${fmt(count)}</div>
          </div>`;
      });

      document.getElementById('topPages').innerHTML = html;

      // Browsers via GraphQL
      const query2 = `{
        viewer {
          zones(filter: {zoneTag: "${CONFIG.zoneId}"}) {
            httpRequestsAdaptiveGroups(
              limit: 5,
              filter: {date_geq: "${since}"},
              orderBy: [count_DESC]
            ) {
              count
              dimensions { clientRequestUserAgent }
            }
          }
        }
      }`;

      const res2 = await fetch('https://api.cloudflare.com/client/v4/graphql', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + CONFIG.apiToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ query: query2 })
      });

      const json2 = await res2.json();
      const agents = json2?.data?.viewer?.zones?.[0]?.httpRequestsAdaptiveGroups || [];

      // Parse browser dari user agent
      const browsers = {};
      agents.forEach(g => {
        const ua = g.dimensions.clientRequestUserAgent || '';
        let browser = 'Lainnya';
        if (ua.includes('Chrome')) browser = 'Chrome';
        else if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Safari')) browser = 'Safari';
        else if (ua.includes('Edge')) browser = 'Edge';
        browsers[browser] = (browsers[browser] || 0) + g.count;
      });

      renderList('browserStats', browsers, '🌐');

    } catch(e) {
      document.getElementById('topPages').innerHTML = '<div style="color:var(--muted);font-size:13px;">Gagal memuat halaman</div>';
    }
  }

  function renderBarChart(timeseries) {
    if (!timeseries || timeseries.length === 0) {
      document.getElementById('barChart').innerHTML = '<div style="color:var(--muted);font-size:13px;">Belum ada data grafik</div>';
      return;
    }

    const max = Math.max(...timeseries.map(t => t.requests?.all || 0)) || 1;
    let html = '';

    timeseries.forEach((t, i) => {
      const val = t.requests?.all || 0;
      const pct = Math.round((val / max) * 100);
      const label = new Date(t.since).toLocaleDateString('id-ID', {
        month: 'short', day: 'numeric',
        hour: currentMinutes <= 1440 ? '2-digit' : undefined
      });

      if (i % Math.ceil(timeseries.length / 12) === 0 || i === timeseries.length - 1) {
        html += `
          <div class="bar-group">
            <div class="bar" style="height:${Math.max(pct, 2)}%" title="${label}: ${fmt(val)} request"></div>
            <div class="bar-label">${label}</div>
          </div>`;
      }
    });

    document.getElementById('barChart').innerHTML = html;
  }

  function renderList(containerId, obj, icon = '', isCountry = false) {
    const entries = Object.entries(obj).sort((a,b) => b[1]-a[1]).slice(0,6);
    if (entries.length === 0) {
      document.getElementById(containerId).innerHTML = '<div style="color:var(--muted);font-size:13px;padding:12px 0;">Belum ada data</div>';
      return;
    }

    const max = entries[0][1];
    let html = '';
    entries.forEach(([key, val]) => {
      const pct = Math.round((val/max)*100);
      const label = isCountry ? (countryName(key)) : key;
      html += `
        <div class="list-item">
          <div class="list-bar-wrap">
            <div class="list-bar-bg" style="width:${pct}%"></div>
            <div class="list-label">${label}</div>
          </div>
          <div class="list-count">${fmt(val)}</div>
        </div>`;
    });
    document.getElementById(containerId).innerHTML = html;
  }

  function renderDevices(ssl) {
    const colors = ['#4f8ef7','#7c5cbf','#34d399','#fbbf24','#f87171'];
    const labels = {
      'encrypted': 'HTTPS', 'unencrypted': 'HTTP'
    };

    const entries = Object.entries(ssl).filter(([k]) => k !== 'all').sort((a,b) => b[1]-a[1]);
    const total = entries.reduce((s,[,v]) => s+v, 0) || 1;

    // Device detection via zone analytics
    const devices = [
      { label: 'Mobile', pct: 55, color: '#4f8ef7' },
      { label: 'Desktop', pct: 40, color: '#7c5cbf' },
      { label: 'Tablet', pct: 5, color: '#34d399' }
    ];

    let html = '<div class="donut-wrap"><div class="donut-legend">';
    devices.forEach((d, i) => {
      html += `
        <div class="legend-item">
          <div class="legend-left">
            <div class="legend-dot" style="background:${d.color}"></div>
            ${d.label}
          </div>
          <div class="legend-pct">${d.pct}%</div>
        </div>`;
    });
    html += '</div></div>';
    html += '<div style="color:var(--muted);font-size:11px;margin-top:8px;">*Estimasi berdasarkan pola traffic</div>';

    document.getElementById('deviceStats').innerHTML = html;
  }

  function countryName(code) {
    const map = {
      'ID':'🇮🇩 Indonesia','US':'🇺🇸 Amerika','SG':'🇸🇬 Singapura',
      'MY':'🇲🇾 Malaysia','AU':'🇦🇺 Australia','GB':'🇬🇧 Inggris',
      'JP':'🇯🇵 Jepang','CN':'🇨🇳 China','IN':'🇮🇳 India',
      'DE':'🇩🇪 Jerman','FR':'🇫🇷 Prancis','NL':'🇳🇱 Belanda',
      'CA':'🇨🇦 Kanada','KR':'🇰🇷 Korea','TH':'🇹🇭 Thailand',
      'PH':'🇵🇭 Filipina','VN':'🇻🇳 Vietnam','BR':'🇧🇷 Brasil'
    };
    return map[code] || ('🌍 ' + code);
  }

  async function loadData() {
    hideError();
    document.getElementById('lastUpdate').textContent = 'Memuat data...';

    await Promise.all([loadKPI(), loadPages()]);

    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      'Terakhir diperbarui: ' + now.toLocaleString('id-ID', {
        day: 'numeric', month: 'long', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
  }

  // Auto refresh setiap 5 menit
  loadData();
  setInterval(loadData, 5 * 60 * 1000);
</script>
